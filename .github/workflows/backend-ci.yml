name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - "lib/**"
      - "scripts/gtfs-prepare.mjs"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "lib/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint --workspace=backend
